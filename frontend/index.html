<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="UTF-8">
    <link rel="icon" href="%BASE_URL%favicon.ico">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChefMate</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: #f4efe6;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at top left, rgba(229, 143, 91, 0.18), transparent 24rem),
          radial-gradient(circle at right, rgba(54, 106, 94, 0.12), transparent 26rem),
          #f4efe6;
      }

      #app {
        min-height: 100vh;
      }

      .boot-screen {
        display: grid;
        min-height: 100vh;
        place-items: center;
      }

      .boot-inner {
        display: grid;
        gap: 0.8rem;
        justify-items: center;
        color: #2f5d50;
      }

      .boot-mark {
        width: 3rem;
        height: 3rem;
        border: 3px solid rgba(47, 93, 80, 0.14);
        border-top-color: #2f5d50;
        border-radius: 999px;
        animation: boot-spin 0.9s linear infinite;
      }

      .boot-inner strong {
        font-size: 1rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .boot-inner p {
        margin: 0;
        color: rgba(29, 43, 39, 0.68);
        font-size: 0.92rem;
      }

      @keyframes boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="boot-screen">
        <div class="boot-inner">
          <div class="boot-mark" aria-hidden="true"></div>
          <strong>ChefMate</strong>
          <p>正在准备你的厨房工作台</p>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
